document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"display:flex;justify-content:space-between;font-size:14px;margin-bottom:7px;\"><span style=\"color:#5C6770;font-weight:500;\">{{ sh.label }}<\u002Fspan><span style=\"font-weight:800;color:#003040;\">{{ sh.value }}%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:8px;background:#ECEFF2;border-radius:9999px;overflow:hidden;\"><div style=\"height:100%;width:{{ sh.pct }};background:#006F9B;border-radius:9999px;transform-origin:left;animation:ccBar .7s cubic-bezier(0.22,0.61,0.36,1) both;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ACHIEVEMENTS -->\n      <section style=\"animation:ccFade .5s ease both .12s;\">\n        <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#006F9B;font-weight:600;\">Résumé<\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3vw,36px);font-weight:800;letter-spacing:-0.02em;margin:8px 0 8px;\">Career &amp; accolades<\u002Fh2>\n        <div style=\"width:64px;height:4px;background:#006F9B;border-radius:9999px;margin-bottom:32px;\"><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;\">\n          <sc-for list=\"{{ sel.achievements }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:12px;background:#E5F1F7;border-radius:12px;padding:14px 18px;transition:transform .15s;\" style-hover=\"transform:translateY(-2px);\">\n              <div style=\"width:34px;height:34px;flex:none;border-radius:8px;background:#006F9B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;\">{{ a.count }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:600;color:#003040;\">{{ a.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- TRAINING -->\n      <section style=\"animation:ccFade .5s ease both .18s;\">\n        <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#006F9B;font-weight:600;\">The blueprint<\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3vw,36px);font-weight:800;letter-spacing:-0.02em;margin:8px 0 8px;\">Train like {{ sel.firstName }}<\u002Fh2>\n        <div style=\"width:64px;height:4px;background:#006F9B;border-radius:9999px;margin-bottom:24px;\"><\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.6;color:#2F3940;max-width:66ch;margin:0 0 40px;\">{{ sel.philosophy }}<\u002Fp>\n\n        <div style=\"display:grid;gap:24px;\">\n          <sc-for list=\"{{ sel.training }}\" as=\"block\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #ECEFF2;border-radius:16px;overflow:hidden;\">\n              <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between;padding:22px 28px;border-bottom:1px solid #ECEFF2;background:#F6F8FA;\">\n                <div>\n                  <div style=\"font-weight:800;font-size:19px;letter-spacing:-0.01em;color:#003040;\">{{ block.title }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#5C6770;margin-top:3px;\">{{ block.focus }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#006F9B;background:#E5F1F7;padding:6px 12px;border-radius:9999px;\">{{ block.day }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:8px 28px 20px;\">\n                <sc-for list=\"{{ block.exercises }}\" as=\"ex\" hint-placeholder-count=\"4\">\n                  <div style=\"display:grid;grid-template-columns:1fr auto;gap:16px;align-items:baseline;padding:16px 12px;margin:0 -12px;border-bottom:1px solid #F1F4F6;border-radius:8px;transition:background .15s;\" style-hover=\"background:#F6F8FA;\">\n                    <div>\n                      <div style=\"font-weight:600;font-size:15px;color:#003040;\">{{ ex.name }}<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#5C6770;margin-top:4px;line-height:1.45;\">{{ ex.note }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"text-align:right;white-space:nowrap;\"><span style=\"font-weight:800;font-size:15px;color:#006F9B;\">{{ ex.prescription }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:32px;background:#003040;color:#C7E0EC;border-radius:16px;padding:28px 32px;font-size:14px;line-height:1.6;\">\n          <b style=\"color:#fff;\">Note.<\u002Fb> These blueprints are training-style guides inspired by how elite guards, wings and bigs build their game — not official programs from the players. Warm up first, scale the loads to your level, and rest between sessions.\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <footer style=\"border-top:1px solid #D9DEE3;background:#fff;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:28px 24px;font-size:13px;color:#8A949E;display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;\">\n      <span>CourtCraft — study the game, train the body.<\u002Fspan>\n      <span>Stats reflect career averages · Illustrative training blueprints<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst G=\"#006F9B\",D=\"#003040\",M6=\"#005C81\",M4=\"#2284AC\",M7=\"#004A68\",M3=\"#4F9DBF\";\nconst ACCENTS=[\"#003040\",\"#006F9B\",\"#0A6E7C\",\"#2A4A7F\",\"#5B3E8E\",\"#8A5A2B\",\"#1E7A5A\",\"#9B2D3B\",\"#B07A18\",\"#455A64\",\"#2E6E8E\",\"#7A3E52\"];\nconst TEAM_COLORS={\n\"Los Angeles Lakers\":\"#552583\",\"Golden State Warriors\":\"#1D428A\",\"Milwaukee Bucks\":\"#00471B\",\n\"Denver Nuggets\":\"#0E2240\",\"Phoenix Suns\":\"#1D1160\",\"Boston Celtics\":\"#007A33\",\"San Antonio Spurs\":\"#2B2B2B\",\n\"Philadelphia 76ers\":\"#006BB6\",\"Oklahoma City Thunder\":\"#007AC1\",\"Memphis Grizzlies\":\"#5D76A9\",\n\"Minnesota Timberwolves\":\"#0C2340\",\"Dallas Mavericks\":\"#00538C\",\"Indiana Pacers\":\"#002D62\",\n\"New York Knicks\":\"#F58426\",\"Portland Trail Blazers\":\"#E03A3E\",\"LA Clippers\":\"#C8102E\",\n\"Cleveland Cavaliers\":\"#860038\",\"Atlanta Hawks\":\"#E03A3E\",\"New Orleans Pelicans\":\"#0C2340\",\n\"Orlando Magic\":\"#0077C0\",\"Miami Heat\":\"#98002E\",\"Sacramento Kings\":\"#5A2D81\",\"Detroit Pistons\":\"#1D428A\",\n\"Houston Rockets\":\"#CE1141\",\"Toronto Raptors\":\"#CE1141\",\"Utah Jazz\":\"#002B5C\",\n\"Washington Wizards\":\"#E31837\",\"Chicago Bulls\":\"#CE1141\",\"Charlotte Hornets\":\"#00788C\",\"Brooklyn Nets\":\"#3A3A3A\"};\n\nconst GUARD=(name)=>[\n  {title:\"Ball-handling & finishing\",focus:\"Elite control under pressure\",day:\"Day 1\",exercises:[\n    {name:\"Two-ball dribbling series\",prescription:\"5 × 45s\",note:\"Alternating, crossover and low-pound combos at game speed.\"},\n    {name:\"Cone attack + finishes\",prescription:\"6 × 6 reps\",note:\"Change of pace into euro-step, floater and reverse layups.\"},\n    {name:\"Tight-space handle work\",prescription:\"4 × 40s\",note:\"In-and-out, behind-back and hesitation in a 1m box.\"},\n    {name:\"Contact finishing (pad)\",prescription:\"5 × 8\",note:\"Absorb a bump, finish through with both hands.\"},\n  ]},\n  {title:\"Shooting off the dribble\",focus:\"Volume + shot quality\",day:\"Day 2\",exercises:[\n    {name:\"Form shooting close-out\",prescription:\"3 × 25 makes\",note:\"One-hand then two, locking the release point.\"},\n    {name:\"Pull-up mid-range series\",prescription:\"5 spots × 10\",note:\"One-dribble pull-ups off both directions.\"},\n    {name:\"Step-back threes\",prescription:\"5 × 10 makes\",note:\"Create space, land balanced, hold follow-through.\"},\n    {name:\"Catch-and-shoot 3s\",prescription:\"200 makes\",note:\"Off relocation and screens, on the move.\"},\n  ]},\n  {title:\"Speed, agility & core\",focus:\"First-step & change of direction\",day:\"Day 3\",exercises:[\n    {name:\"Lateral bounds\",prescription:\"4 × 8/side\",note:\"Stick the landing, build hip stability.\"},\n    {name:\"Resisted sprints\",prescription:\"6 × 15m\",note:\"Band or sled for explosive first step.\"},\n    {name:\"Ladder + reaction cuts\",prescription:\"5 rounds\",note:\"Fast feet into a coach-called cut.\"},\n    {name:\"Anti-rotation core (Pallof)\",prescription:\"3 × 12/side\",note:\"Brace the trunk for finishing through contact.\"},\n  ]},\n  {title:\"Strength base\",focus:\"Durability for an 82-game grind\",day:\"Day 4\",exercises:[\n    {name:\"Trap-bar deadlift\",prescription:\"4 × 5\",note:\"Lower-body power without heavy spinal load.\"},\n    {name:\"Bulgarian split squat\",prescription:\"3 × 8/leg\",note:\"Single-leg strength and balance.\"},\n    {name:\"Weighted pull-ups\",prescription:\"4 × 6\",note:\"Upper-back strength for finishing and defense.\"},\n    {name:\"Nordic hamstring curls\",prescription:\"3 × 6\",note:\"Hamstring health, sprint protection.\"},\n  ]},\n];\n\nconst WING=(name)=>[\n  {title:\"Shot creation\",focus:\"Score from all three levels\",day:\"Day 1\",exercises:[\n    {name:\"Jab-series into pull-up\",prescription:\"5 spots × 8\",note:\"Sell the jab, rise into a balanced jumper.\"},\n    {name:\"Iso attack finishes\",prescription:\"6 × 6\",note:\"Face-up, one dribble, finish over length.\"},\n    {name:\"Mid-post turnarounds\",prescription:\"4 × 10/side\",note:\"Footwork into fadeaway and up-and-under.\"},\n    {name:\"Transition pull-ups\",prescription:\"5 × 8\",note:\"Sprint the floor, decelerate, knock it down.\"},\n  ]},\n  {title:\"Shooting volume\",focus:\"Consistent, repeatable stroke\",day:\"Day 2\",exercises:[\n    {name:\"Guided form shooting\",prescription:\"3 × 25 makes\",note:\"Fix the base, elbow and follow-through.\"},\n    {name:\"Catch-and-shoot 3s\",prescription:\"250 makes\",note:\"Spot-up and off relocation.\"},\n    {name:\"Movement 3s off screens\",prescription:\"5 × 10 makes\",note:\"Come off tight, square and fire.\"},\n    {name:\"Free throws under fatigue\",prescription:\"10 × 2\",note:\"After sprints, simulate late-game legs.\"},\n  ]},\n  {title:\"Explosiveness & agility\",focus:\"Two-way athleticism\",day:\"Day 3\",exercises:[\n    {name:\"Depth jumps to box\",prescription:\"4 × 5\",note:\"Reactive power for finishing and blocks.\"},\n    {name:\"Defensive slide circuit\",prescription:\"5 × 30s\",note:\"Stay low, mirror, close out.\"},\n    {name:\"Med-ball rotational throws\",prescription:\"4 × 6/side\",note:\"Transfer power through the hips.\"},\n    {name:\"Sprint-decel ladders\",prescription:\"6 rounds\",note:\"Control the stop to change direction.\"},\n  ]},\n  {title:\"Strength & resilience\",focus:\"Absorb contact, stay healthy\",day:\"Day 4\",exercises:[\n    {name:\"Back squat\",prescription:\"4 × 5\",note:\"Foundational lower-body strength.\"},\n    {name:\"Weighted step-ups\",prescription:\"3 × 8/leg\",note:\"Single-leg drive for finishing.\"},\n    {name:\"Bench + row superset\",prescription:\"4 × 8\",note:\"Balanced upper-body push/pull.\"},\n    {name:\"Shoulder & cuff prep\",prescription:\"3 × 12\",note:\"Keep the shooting shoulder durable.\"},\n  ]},\n];\n\nconst BIG=(name)=>[\n  {title:\"Footwork & touch\",focus:\"Efficient scoring inside\",day:\"Day 1\",exercises:[\n    {name:\"Mikan & reverse Mikan\",prescription:\"4 × 20\",note:\"Soft touch with both hands at the rim.\"},\n    {name:\"Post-move series\",prescription:\"5 × 6/side\",note:\"Drop step, jump hook, up-and-under.\"},\n    {name:\"Short-roll decisions\",prescription:\"5 × 8\",note:\"Catch on the move, finish or kick.\"},\n    {name:\"Face-up drive & floater\",prescription:\"5 spots × 8\",note:\"Attack a close-out from the elbow.\"},\n  ]},\n  {title:\"Range & passing\",focus:\"Modern stretch-big skills\",day:\"Day 2\",exercises:[\n    {name:\"Form-to-3 shooting\",prescription:\"3 × 20 makes\",note:\"Extend the same stroke to the arc.\"},\n    {name:\"Pick-and-pop 3s\",prescription:\"5 × 10 makes\",note:\"Screen, relocate, catch and shoot.\"},\n    {name:\"High-post passing reads\",prescription:\"5 × 10\",note:\"Hit cutters and shooters from the elbow.\"},\n    {name:\"Free throws\",prescription:\"10 × 10\",note:\"Repeatable routine, high volume.\"},\n  ]},\n  {title:\"Rim protection & mobility\",focus:\"Anchor the defense\",day:\"Day 3\",exercises:[\n    {name:\"Vertical contest jumps\",prescription:\"5 × 6\",note:\"Contest without fouling, land balanced.\"},\n    {name:\"Lateral drop-coverage\",prescription:\"5 × 30s\",note:\"Slide with guards, recover to the rim.\"},\n    {name:\"Rebound & outlet\",prescription:\"5 × 8\",note:\"Box out, secure, start the break.\"},\n    {name:\"Hip mobility flow\",prescription:\"3 rounds\",note:\"Keep big hips loose and springy.\"},\n  ]},\n  {title:\"Power & mass\",focus:\"Own the paint\",day:\"Day 4\",exercises:[\n    {name:\"Front squat\",prescription:\"4 × 5\",note:\"Posture and leg drive for post work.\"},\n    {name:\"Trap-bar jump\",prescription:\"5 × 3\",note:\"Explosive power off two feet.\"},\n    {name:\"Heavy carries\",prescription:\"4 × 30m\",note:\"Core and grip strength for battles.\"},\n    {name:\"Overhead press\",prescription:\"4 × 6\",note:\"Finishing strength through contact.\"},\n  ]},\n];\n\nconst PLAYERS=[\n  {id:\"lebron\",name:\"LeBron James\",first:\"LeBron\",team:\"Los Angeles Lakers\",position:\"Forward\",number:\"23\",height:\"6'9\\\"\",weight:\"250 lb\",exp:\"22 seasons\",accent:D,\n   ppg:\"27.1\",rpg:\"7.5\",apg:\"7.4\",spg:\"1.5\",fg:50,tp:35,ft:74,\n   ach:[{c:\"4×\",l:\"NBA Champion\"},{c:\"4×\",l:\"MVP\"},{c:\"4×\",l:\"Finals MVP\"},{c:\"21×\",l:\"All-Star\"},{c:\"1\",l:\"All-time scoring leader\"}],\n   phil:\"LeBron's edge is a freakish blend of size, speed and durability, built on a legendary year-round conditioning program. The focus: total-body power, elite recovery and a game that scores and creates from every spot on the floor.\",\n   train:WING()},\n  {id:\"curry\",name:\"Stephen Curry\",first:\"Stephen\",team:\"Golden State Warriors\",position:\"Guard\",number:\"30\",height:\"6'2\\\"\",weight:\"185 lb\",exp:\"16 seasons\",accent:G,\n   ppg:\"24.7\",rpg:\"4.7\",apg:\"6.4\",spg:\"1.6\",fg:47,tp:42,ft:91,\n   ach:[{c:\"4×\",l:\"NBA Champion\"},{c:\"2×\",l:\"MVP\"},{c:\"1\",l:\"Finals MVP\"},{c:\"11×\",l:\"All-Star\"},{c:\"1\",l:\"All-time 3PT leader\"}],\n   phil:\"Curry redefined range with relentless shooting volume, blistering handle and neuromuscular training that sharpens balance and reaction. The blueprint is footwork, conditioning and thousands of makes on the move.\",\n   train:GUARD()},\n  {id:\"giannis\",name:\"Giannis Antetokounmpo\",first:\"Giannis\",team:\"Milwaukee Bucks\",position:\"Forward\",number:\"34\",height:\"6'11\\\"\",weight:\"243 lb\",exp:\"13 seasons\",accent:M6,\n   ppg:\"23.6\",rpg:\"9.8\",apg:\"4.9\",spg:\"1.1\",fg:55,tp:29,ft:70,\n   ach:[{c:\"1\",l:\"NBA Champion\"},{c:\"2×\",l:\"MVP\"},{c:\"1\",l:\"Finals MVP\"},{c:\"1\",l:\"Defensive POY\"},{c:\"9×\",l:\"All-Star\"}],\n   phil:\"Giannis pairs a 7-foot frame with guard mobility, powered by explosive lower-body work and a huge focus on flexibility and length. Downhill attacks, transition finishing and two-way motor define his training.\",\n   train:WING()},\n  {id:\"jokic\",name:\"Nikola Jokić\",first:\"Nikola\",team:\"Denver Nuggets\",position:\"Center\",number:\"15\",height:\"6'11\\\"\",weight:\"284 lb\",exp:\"11 seasons\",accent:M7,\n   ppg:\"21.4\",rpg:\"11.0\",apg:\"7.1\",spg:\"1.3\",fg:57,tp:35,ft:83,\n   ach:[{c:\"1\",l:\"NBA Champion\"},{c:\"3×\",l:\"MVP\"},{c:\"1\",l:\"Finals MVP\"},{c:\"7×\",l:\"All-Star\"},{c:\"5×\",l:\"All-NBA First\"}],\n   phil:\"Jokić's genius is footwork, touch and elite court vision over raw athleticism. The work centers on skill volume — passing reads, soft finishes and range — plus mobility to stay springy at his size.\",\n   train:BIG()},\n  {id:\"luka\",name:\"Luka Dončić\",first:\"Luka\",team:\"Los Angeles Lakers\",position:\"Guard\",number:\"77\",height:\"6'7\\\"\",weight:\"230 lb\",exp:\"8 seasons\",accent:M4,\n   ppg:\"28.6\",rpg:\"8.7\",apg:\"8.3\",spg:\"1.4\",fg:47,tp:35,ft:75,\n   ach:[{c:\"5×\",l:\"All-Star\"},{c:\"5×\",l:\"All-NBA First\"},{c:\"1\",l:\"Scoring champion\"},{c:\"1\",l:\"Rookie of the Year\"}],\n   phil:\"Luka overwhelms with pace changes, size at guard and a bottomless bag of step-backs. His prep leans on conditioning, deceleration control and shot creation off the dribble from all three levels.\",\n   train:GUARD()},\n  {id:\"durant\",name:\"Kevin Durant\",first:\"Kevin\",team:\"Phoenix Suns\",position:\"Forward\",number:\"35\",height:\"6'11\\\"\",weight:\"240 lb\",exp:\"18 seasons\",accent:M6,\n   ppg:\"27.3\",rpg:\"7.0\",apg:\"4.4\",spg:\"1.1\",fg:50,tp:39,ft:88,\n   ach:[{c:\"2×\",l:\"NBA Champion\"},{c:\"1\",l:\"MVP\"},{c:\"2×\",l:\"Finals MVP\"},{c:\"15×\",l:\"All-Star\"},{c:\"4×\",l:\"Scoring champ\"}],\n   phil:\"Durant is the purest scorer in the game — a 7-footer with a guard's stroke. Training is all about shooting mechanics, mid-range mastery and mobility to release cleanly over any contest.\",\n   train:WING()},\n  {id:\"tatum\",name:\"Jayson Tatum\",first:\"Jayson\",team:\"Boston Celtics\",position:\"Forward\",number:\"0\",height:\"6'8\\\"\",weight:\"210 lb\",exp:\"9 seasons\",accent:G,\n   ppg:\"23.9\",rpg:\"7.2\",apg:\"3.8\",spg:\"1.0\",fg:46,tp:37,ft:85,\n   ach:[{c:\"1\",l:\"NBA Champion\"},{c:\"6×\",l:\"All-Star\"},{c:\"4×\",l:\"All-NBA\"},{c:\"1\",l:\"All-Star Game MVP\"}],\n   phil:\"Tatum's game grew from spot-up shooter to complete three-level scorer through obsessive skill work and added strength. The plan blends shot creation, footwork and two-way conditioning.\",\n   train:WING()},\n  {id:\"wemby\",name:\"Victor Wembanyama\",first:\"Victor\",te Steals\",delay:\"180ms\"},\n        ],\n        shooting:[\n          {label:\"Field goal %\",value:sp.fg,pct:sp.fg+\"%\"},\n          {label:\"Three-point %\",value:sp.tp,pct:sp.tp+\"%\"},\n          {label:\"Free throw %\",value:sp.ft,pct:sp.ft+\"%\"},\n        ],\n        achievements:sp.ach.map(a=>({count:a.c,label:a.l})),\n      };\n    }\n\n    return{\n      isList:this.state.view===\"list\",\n      isDetail:this.state.view===\"detail\"&&!!sel,\n      goHome:()=>this.home(),\n      onSearch:(e)=>this.setState({q:e.target.value}),\n      onTeam:(e)=>this.setState({team:e.target.value}),\n      onSort:(e)=>this.setState({sort:e.target.value}),\n      clearFilters:()=>this.setState({q:\"\",pos:\"All\",team:\"All\",sort:\"ppg\"}),\n      hasFilters:!!q||pos!==\"All\"||team!==\"All\",\n      positions,filtered,sel,teamOptions,sortOptions,\n      playerCount:PLAYERS.length,\n      teamCount:teams.length,\n      resultLabel:`Showing ${filtered.length} ${filtered.length===1?'player':'players'}`,\n      noResults:filtered.length===0,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
